name: Android release APK

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "name=$TAG" >> "$GITHUB_OUTPUT"
          echo "code=$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Write signing config
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p android/keystore
          echo "$ANDROID_KEYSTORE_BASE64" | tr -d '\n\r ' | base64 -d > android/keystore/meloyvaer-release.jks
          trim() { printf '%s' "$1" | tr -d '\n\r'; }
          {
            echo "storeFile=../keystore/meloyvaer-release.jks"
            echo "storePassword=$(trim "$ANDROID_KEYSTORE_PASSWORD")"
            echo "keyAlias=$(trim "$ANDROID_KEY_ALIAS")"
            echo "keyPassword=$(trim "$ANDROID_KEY_PASSWORD")"
          } > android/app/keystore.properties

      - name: Verify keystore password
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          echo "keystore file size: $(stat -c%s android/keystore/meloyvaer-release.jks) bytes"
          keytool -list -keystore android/keystore/meloyvaer-release.jks \
            -storepass "$(printf '%s' "$ANDROID_KEYSTORE_PASSWORD" | tr -d '\n\r')"

      - name: Build signed release APK
        working-directory: android
        run: ./gradlew assembleRelease -PversionCode=${{ steps.version.outputs.code }} -PversionName=${{ steps.version.outputs.name }}

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk Meloyvaer-${{ steps.version.outputs.name }}.apk

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: Meloyvaer-${{ steps.version.outputs.name }}.apk
          generate_release_notes: true
